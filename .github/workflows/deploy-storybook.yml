name: Deploy Storybook to GitHub Pages

# develop または main へ push されたとき、Storybook を GitHub Pages へデプロイする。
# GitHub Pages の公開設定（Settings → Pages の Source）は人間が行う必要がある。
on:
  push:
    branches:
      - develop
      - main

# actions/deploy-pages が必要とする権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一ブランチの古いデプロイをキャンセルして直列化する
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # common と client のビルドを先行させ、Storybook が型・成果物を参照できるようにする
      - name: Build Storybook
        run: pnpm turbo run storybook:build

      # storybook-static/ を Pages アーティファクトとしてアップロード
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/storybook-static

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
